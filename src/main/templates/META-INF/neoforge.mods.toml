modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"
issueTrackerURL = "https://github.com/Yukovsky/GoidaInvRestore/issues"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
description = '''
${mod_description}
'''

[[dependencies.${mod_id}]]
modId = "neoforge"
type = "required"
versionRange = "${neo_version_range}"
ordering = "NONE"
side = "SERVER"

[[dependencies.${mod_id}]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "SERVER"

[[dependencies.${mod_id}]]
modId = "curios"
type = "optional"
versionRange = "[9.0,)"
ordering = "AFTER"
side = "SERVER"

[[dependencies.${mod_id}]]
modId = "cosmeticarmorreworked"
type = "optional"
versionRange = "*"
ordering = "AFTER"
side = "SERVER"

[[dependencies.${mod_id}]]
modId = "sophisticatedbackpacks"
type = "optional"
versionRange = "*"
ordering = "AFTER"
side = "SERVER"
